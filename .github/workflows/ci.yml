name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  workflow-pin-policy:
    name: Workflow Pin Policy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: ./scripts/check_workflow_pins.sh

  toolchain-guard:
    name: Toolchain Guard (Go)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: ./scripts/check_go_toolchain.sh

  lint-go:
    name: Lint (Go)
    runs-on: ubuntu-24.04
    needs: [toolchain-guard]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.24.13"
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: v1.64.8

  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - run: cd sdk/python && pip install -e ".[dev]" cryptography
      - run: cd sdk/python && ruff check vaol/
      - run: cd sdk/python && mypy vaol/

  test-go:
    name: Test (Go Full)
    runs-on: ubuntu-24.04
    needs: [toolchain-guard]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.24.13"
      - run: go test -race -cover ./...

  test-e2e-tamper:
    name: Test (E2E + Tamper)
    runs-on: ubuntu-24.04
    needs: [toolchain-guard]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.24.13"
      - run: go test -race ./tests/e2e ./tests/tamper -v

  test-python:
    name: Test (Python)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - run: cd sdk/python && pip install -e ".[dev]" cryptography && pytest tests/ -v

  test-typescript:
    name: Test (TypeScript)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
      - run: cd sdk/typescript && npm ci && npm test

  lint-typescript:
    name: Lint (TypeScript)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
      - run: cd sdk/typescript && npm ci && npm run lint

  test-policies:
    name: Test (OPA Policies)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1
        with:
          version: 1.13.2
      - run: opa test policies/ -v

  bench:
    name: Benchmarks
    runs-on: ubuntu-24.04
    needs: [toolchain-guard]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.24.13"
      - run: go test -bench=. -benchmem -count=1 ./pkg/merkle/... ./pkg/signer/... ./pkg/record/... | tee bench-results.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: benchmark-results
          path: bench-results.txt

  bench-startup-restore:
    name: Bench (Startup Restore Gate)
    runs-on: ubuntu-24.04
    needs: [toolchain-guard]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.24.13"
      - run: ./scripts/check_startup_restore_bench.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: startup-restore-benchmark-results
          path: startup-restore-bench.txt

  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    needs: [toolchain-guard]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.24.13"
      - run: go install github.com/securego/gosec/v2/cmd/gosec@v2.23.0
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - run: gosec -quiet -exclude=G104,G117,G204,G304,G306,G704 -exclude-dir=gen ./...
      - run: govulncheck ./...
      - name: Run Trivy filesystem scan
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            aquasec/trivy:0.69.1 \
            fs --no-progress --severity CRITICAL,HIGH --exit-code 0 .

  sbom:
    name: SBOM
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom-spdx
          path: sbom.spdx.json

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: [test-go, test-e2e-tamper, security, bench-startup-restore]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.24.13"
      - run: go build ./cmd/vaol-server
      - run: go build ./cmd/vaol-cli
      - run: go build ./cmd/vaol-proxy

  docker:
    name: Docker Build
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: docker build -f deploy/docker/Dockerfile.server -t vaol-server:ci .
      - run: docker build -f deploy/docker/Dockerfile.proxy -t vaol-proxy:ci .

  auditor-demo:
    name: Auditor Demo (Integration)
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.24.13"
      - name: Run reproducible auditor demo
        env:
          VAOL_DEMO_KEEP_STACK: "0"
        run: ./scripts/demo_auditor.sh
      - name: Validate verifier transcript artifacts
        run: |
          set -euo pipefail
          RUN_DIR="$(ls -1dt tmp/demo-auditor/* | head -n 1)"
          ARTIFACT_DIR="${RUN_DIR}/artifacts"
          test -s "${ARTIFACT_DIR}/verify-transcript.json"
          test -s "${ARTIFACT_DIR}/verify-report.json"
          test -s "${ARTIFACT_DIR}/verify-report.md"
          jq -e '.profile and .summary and (.steps | type == "array")' "${ARTIFACT_DIR}/verify-transcript.json" >/dev/null
          jq -e '.title and .bundle and (.bundle.results | type == "array")' "${ARTIFACT_DIR}/verify-report.json" >/dev/null
      - name: Upload auditor demo artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: auditor-demo-artifacts
          path: |
            tmp/demo-auditor/**
